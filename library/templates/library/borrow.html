{% extends "library/base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto; font-family: sans-serif;">
    <div style="border: 1px solid #ddd; padding: 30px; border-radius: 10px; background-color: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.05);">
        
        <h2 style="margin-top: 0; color: #333;">Confirm Borrowing</h2>
        <hr>

        <div style="margin: 20px 0;">
            <p style="font-size: 1.1em; color: #555;">You are about to borrow:</p>
            <h3 style="color: #007BFF; margin: 5px 0;">{{ book.title }}</h3>
            <p style="font-style: italic; color: #777;">by {{ book.author }}</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div style="display: none;">
                {{ form.as_p }}
            </div>

            {% if error %}
                <div style="background-color: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #ef9a9a;">
                    <strong>Error:</strong> {{ error }}
                </div>
            {% endif %}

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" style="background-color: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-size: 1em; flex: 2; font-weight: bold;">
                    Confirm & Take Book
                </button>
                
                <a href="{% url 'home' %}" style="text-decoration: none; background-color: #6c757d; color: white; padding: 12px 20px; border-radius: 5px; text-align: center; flex: 1; font-size: 1em;">
                    Cancel
                </a>
            </div>
        </form>

    </div>
    <p style="text-align: center; color: #999; font-size: 0.8em; margin-top: 15px;">
        Account: {{ user.username }} | Date: {% now "Y-m-d" %}
    </p>
</div>
{% endblock %}
